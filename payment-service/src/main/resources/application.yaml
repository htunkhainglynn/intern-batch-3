spring:
  application:
    name: payment
  mongodb:
    uri: mongodb://admin:password@bore.pub:28017/payment?authSource=admin
  kafka:
    bootstrap-servers: bore.pub:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

server:
  port: 8081

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.cache: TRACE
    org.wavemoney.payment: DEBUG

transaction-amount:
  min: 100

wallet-limit: 10000000

